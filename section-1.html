<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExactSDS — Section 1: Product Details</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Figtree:wght@500;600&family=Plus+Jakarta+Sans:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="page-dots bg-white min-h-screen">

<header id="app-header"></header>

<div class="flex relative z-[1]">
  <!-- icon rail -->
  <aside id="app-rail" class="w-[76px] shrink-0 border-r border-[#e2e5e9] bg-white h-[calc(100vh-62px)] sticky top-0"></aside>

  <!-- stepper -->
  <aside class="w-[222px] shrink-0 border-r border-[#e2e5e9] pt-8 pl-6 pr-4 hidden lg:block">
    <nav id="app-steps" class="anim-fade-up"></nav>
  </aside>

  <!-- main -->
  <main class="flex-1 min-w-0 px-6 py-7 max-w-[760px]">
    <div class="anim-fade-up">
      <h2 class="text-[20px] font-semibold text-[#0a0b19]">Section 1: <span class="text-[#5c67f9]">Product Details</span></h2>
      <p class="text-[14px] text-[#45454d] mt-1">Enter the basic information about your product and SDS configuration</p>
    </div>

    <form id="s1-form" class="stagger mt-5 space-y-5" novalidate>
      <!-- Product Information -->
      <section class="border border-[#e2e5e9] rounded-2xl bg-[#f8f9fa] p-6">
        <h3 class="text-[18px] font-semibold text-[#3f43af] mb-5">Product Information</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-5 gap-y-4">
          <div>
            <label class="lbl" for="productName">Product Name <span class="text-[#f04438]">*</span></label>
            <input id="productName" class="field" placeholder="e.g., XZ-10C" autocomplete="off" />
          </div>
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label class="lbl !mb-0" for="companyName">Company Name <span class="text-[#f04438]">*</span></label>
              <button type="button" class="text-[12px] font-medium text-[#344054] hover:text-[#5c67f9] transition-colors flex items-center gap-1" onclick="addCompany()">Add Company <span class="text-[14px] leading-none">+</span></button>
            </div>
            <select id="companyName" class="field" required>
              <option value="" disabled hidden>e.g., ExactSDS Inc.</option>
            </select>
          </div>
          <div>
            <label class="lbl" for="formulation">Formulation Number</label>
            <input id="formulation" class="field" placeholder="e.g., 12345" autocomplete="off" />
          </div>
          <div>
            <label class="lbl" for="productCode">Product Code</label>
            <input id="productCode" class="field" placeholder="e.g., PC-12345" autocomplete="off" />
          </div>
          <div>
            <label class="lbl" for="versionNumber">Version Number</label>
            <input id="versionNumber" class="field" placeholder="e.g., V-1" autocomplete="off" />
          </div>
          <div>
            <label class="lbl flex items-center gap-1.5" for="synonyms">Synonyms
              <span class="tip text-[#98a2b3]" id="syn-info"></span>
            </label>
            <input id="synonyms" class="field" placeholder="e.g., Dihydrogen monoxide, Aqua" autocomplete="off" />
          </div>
        </div>
      </section>

      <!-- SDS Configuration -->
      <section class="border border-[#e2e5e9] rounded-2xl bg-[#f8f9fa] p-6">
        <h3 class="text-[18px] font-semibold text-[#3f43af] mb-5">SDS Configuration</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-5 gap-y-4">
          <div>
            <label class="lbl" for="country">Country <span class="text-[#f04438]">*</span></label>
            <select id="country" class="field placeholder" required>
              <option value="" disabled selected hidden>Select country</option>
            </select>
          </div>
          <div>
            <label class="lbl" for="language">Language <span class="text-[#f04438]">*</span></label>
            <select id="language" class="field placeholder" required>
              <option value="" disabled selected hidden>Select language</option>
            </select>
          </div>
          <div class="md:col-span-2">
            <label class="lbl" for="regulation">Regulation <span class="text-[#f04438]">*</span></label>
            <select id="regulation" class="field placeholder" required>
              <option value="" disabled selected hidden>Select regulation standard</option>
            </select>
          </div>
          <div>
            <label class="lbl flex items-center gap-1.5" for="uses">Uses
              <span class="tip text-[#98a2b3]" id="uses-info"></span>
            </label>
            <textarea id="uses" class="field" placeholder="e.g., Industrial cleaning agent; laboratory reagent"></textarea>
          </div>
          <div>
            <label class="lbl" for="emergency">Emergency Contact</label>
            <textarea id="emergency" class="field" placeholder="e.g., CHEMTREC +1-800-424-9300 (24h)"></textarea>
          </div>

          <div class="md:col-span-2 -mb-1">
            <label class="lbl !mb-0">Product Type <span class="text-[#f04438]">*</span></label>
          </div>

          <!-- hazard choice -->
          <div class="choice-card" data-hazard="hazardous" onclick="pickHazard(this)">
            <div class="w-9 h-9 rounded-full bg-[#eef0fe] text-[#5c67f9] flex items-center justify-center shrink-0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5 2.8 19.5a1 1 0 0 0 .9 1.5h16.6a1 1 0 0 0 .9-1.5L12 2.5Zm0 6.5c.6 0 1 .4 1 1v3.5a1 1 0 1 1-2 0V10c0-.6.4-1 1-1Zm0 9.2a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4Z"/></svg>
            </div>
            <div>
              <p class="text-[15px] font-semibold text-[#1f1f26]">Hazardous Product</p>
              <p class="text-[12px] text-[#727284]">Contains hazardous materials</p>
            </div>
            <span class="ring"><i></i></span>
          </div>
          <div class="choice-card" data-hazard="non-hazardous" onclick="pickHazard(this)">
            <div class="w-9 h-9 rounded-full bg-[#e8f1fe] text-[#2970ff] flex items-center justify-center shrink-0">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 4 5.5V11c0 5 3.4 9.4 8 10.5 4.6-1.1 8-5.5 8-10.5V5.5L12 2Zm-1.2 13.7-3-3 1.4-1.4 1.6 1.6 4-4.3 1.5 1.4-5.5 5.7Z"/></svg>
            </div>
            <div>
              <p class="text-[15px] font-semibold text-[#1f1f26]">Non-Hazardous Product</p>
              <p class="text-[12px] text-[#727284]">Safe materials only</p>
            </div>
            <span class="ring"><i></i></span>
          </div>
        </div>

        <button type="submit" id="s1-save" class="btn-primary w-full mt-6 !py-3 text-[16px]">Save &amp; Continue</button>
      </section>
    </form>
  </main>

  <!-- tutorial -->
  <aside class="w-[360px] shrink-0 px-6 py-7 hidden xl:block">
    <div id="app-tutorial"></div>
  </aside>
</div>

<script src="assets/data.js"></script>
<script src="assets/common.js"></script>
<script>
renderShell({ step: 0, header: "breadcrumb", crumb: "Product Details", tutorial: "1" });

// info-icon tooltips
document.getElementById("syn-info").innerHTML = `${I.info}<span class="tip-pop">Other names this product is sold or referred to under.</span>`;
document.getElementById("uses-info").innerHTML = `${I.info}<span class="tip-pop">Identified uses or recommended applications for the product.</span>`;

// populate selects
function fillSelect(id, items, selected) {
  const el = document.getElementById(id);
  items.forEach((v) => {
    const o = document.createElement("option");
    o.value = o.textContent = v;
    if (v === selected) o.selected = true;
    el.appendChild(o);
  });
  el.classList.toggle("placeholder", !el.value);
  el.addEventListener("change", () => el.classList.remove("placeholder"));
}
const s1 = State.data.section1;
// Company defaults to the first option unless a different one was saved
fillSelect("companyName", COMPANIES, s1.company || COMPANIES[0]);
fillSelect("country", COUNTRIES, s1.country);
fillSelect("language", LANGUAGES, s1.language);
fillSelect("regulation", REGULATIONS, s1.regulation);

// restore saved values; Version Number defaults to "V-1"
["productName","formulation","productCode","versionNumber","synonyms","uses","emergency"].forEach((id) => {
  if (s1[id]) document.getElementById(id).value = s1[id];
});
if (!s1.versionNumber) document.getElementById("versionNumber").value = "V-1";
if (s1.hazard) {
  const card = document.querySelector(`[data-hazard="${s1.hazard}"]`);
  card && card.classList.add("selected");
}

function pickHazard(el) {
  document.querySelectorAll(".choice-card").forEach((c) => c.classList.remove("selected"));
  el.classList.add("selected");
}

function addCompany() {
  const secHead = (icon, title) => `<div class="flex items-center gap-2 text-[#1f1f26]"><span class="text-[#5c67f9]">${icon}</span><h4 class="text-[15px] font-semibold">${title}</h4></div>`;
  const field = (label, id, ph, { req = false } = {}) => `
    <div>
      <label class="lbl" for="${id}">${label}${req ? ' <span class="text-[#f04438]">*</span>' : ""}</label>
      <input id="${id}" class="field" placeholder="${ph}" autocomplete="off" />
    </div>`;
  const ov = openOverlay(`
    <div class="modal bg-white rounded-2xl shadow-2xl w-[880px] max-w-[95vw] max-h-[90vh] flex flex-col overflow-hidden">
      <header class="flex items-start justify-between px-7 py-5 border-b border-[#eef0f3] shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-[#5c67f9] text-white flex items-center justify-center">${I.building}</div>
          <div>
            <h3 class="text-[18px] font-semibold text-[#1f1f26]">Add New Company</h3>
            <p class="text-[13px] text-[#727284]">Add the company that appears on this SDS.</p>
          </div>
        </div>
        <button class="icon-btn !p-2.5 border border-[#e2e5e9] rounded-xl" onclick="closeOverlay(this.closest('.overlay'))">${I.x}</button>
      </header>

      <div class="nice-scroll flex-1 overflow-y-auto px-7 py-6 grid grid-cols-1 lg:grid-cols-[1fr_290px] gap-7">
        <!-- left column -->
        <div class="space-y-5 lg:pr-7 lg:border-r border-[#eef0f3]">
          ${secHead(I.building, "Company Information")}
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-5 gap-y-4">
            ${field("Company Name", "co-name", "e.g., ExactSDS Inc.", { req: true })}
            <div>
              <label class="lbl" for="co-website">Website</label>
              <div class="flex items-stretch border border-[#d0d5dd] rounded-[10px] overflow-hidden focus-within:border-[#5c67f9] focus-within:ring-4 focus-within:ring-[#5c67f9]/10 transition-all">
                <span class="flex items-center px-3 text-[14px] text-[#727284] bg-[#f8f9fa] border-r border-[#e2e5e9]">https://</span>
                <input id="co-website" class="flex-1 min-w-0 px-3 py-2.5 text-[14px] text-[#1f1f26] outline-none" placeholder="www.example.com" autocomplete="off" />
              </div>
            </div>
            ${field("Email", "co-email", "e.g., safety@exactsds.com")}
            ${field("Telephone", "co-phone", "e.g., +1 555 0100")}
          </div>

          <div class="pt-1">${secHead(I.pin, "Address")}</div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-5 gap-y-4">
            ${field("Country", "co-country", "e.g., United States")}
            ${field("State / Region", "co-state", "e.g., California")}
            <div class="md:col-span-2">
              <label class="lbl" for="co-street">Street</label>
              <input id="co-street" class="field" placeholder="e.g., 123 Market Street" autocomplete="off" />
            </div>
            ${field("City/Suburb", "co-city", "e.g., San Francisco")}
            ${field("Postcode", "co-postcode", "e.g., 94105")}
          </div>

          <div class="pt-1">${secHead(I.shieldCheck, "UFI identity")}</div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-x-5 gap-y-4">
            <div>
              <label class="lbl" for="co-vatc">VAT country (ISO)</label>
              <select id="co-vatc" class="field placeholder">
                <option value="" disabled selected hidden>Select Country</option>
                ${["US","GB","DE","FR","NO","SE","NL","JP"].map((c) => `<option>${c}</option>`).join("")}
              </select>
            </div>
            ${field("VAT number", "co-vat", "e.g., US123456789")}
            ${field("Company key", "co-key", "e.g., 12345")}
          </div>
        </div>

        <!-- right column -->
        <div class="space-y-6">
          ${secHead(I.image, "Branding")}
          <div class="flex items-start gap-3.5">
            <div class="w-[58px] h-[58px] rounded-xl bg-[#1f2430] text-[#9aa0ab] flex items-center justify-center shrink-0">${I.image}</div>
            <div>
              <p class="text-[15px] font-semibold text-[#1f1f26]">Upload your Logo</p>
              <p class="text-[12px] text-[#727284] mt-0.5">Min 32×32px, SVG, PNG or JPEG</p>
              <div class="flex items-center gap-2 mt-2.5">
                <button class="inline-flex items-center justify-center text-[13px] font-medium text-[#d92d20] border border-[#fda29b] rounded-lg px-3 py-1.5 hover:bg-[#fef3f2] transition-colors" onclick="toast('Logo removed')">Remove</button>
                <button class="inline-flex items-center justify-center text-[13px] font-medium text-[#344054] border border-[#d0d5dd] rounded-lg px-3 py-1.5 hover:border-[#5c67f9] hover:text-[#5c67f9] transition-colors" onclick="toast('Demo: file picker would open')">Change</button>
              </div>
            </div>
          </div>
          <div class="border-t border-[#eef0f3]"></div>
          ${secHead(I.phone, "Emergency contacts")}
          ${field("Emergency telephone", "co-emergency", "e.g., +1 800 424 9300")}
        </div>
      </div>

      <footer class="flex items-center justify-between px-7 py-4 border-t border-[#eef0f3] shrink-0">
        <button class="btn-secondary !py-2.5 !px-6" onclick="closeOverlay(this.closest('.overlay'))">${I.x} Cancel</button>
        <button class="btn-primary !py-2.5 !px-7" onclick="saveCompany(this)">${I.plus} Create</button>
      </footer>
    </div>`);
  setTimeout(() => ov.querySelector("#co-name").focus(), 80);
  ov.querySelector("#co-name").addEventListener("input", (e) => e.target.classList.remove("field-error"));
}
function saveCompany(btn) {
  const input = document.getElementById("co-name");
  const name = input.value.trim();
  if (!name) { input.classList.add("field-error"); input.focus(); toast("Company Name is required", "warn"); return; }
  const sel = document.getElementById("companyName");
  // reuse existing option if the name already exists
  let opt = [...sel.options].find((o) => o.value === name);
  if (!opt) { opt = document.createElement("option"); opt.value = opt.textContent = name; sel.appendChild(opt); }
  opt.selected = true;
  sel.classList.remove("placeholder", "field-error");
  closeOverlay(btn.closest(".overlay"));
  toast(`Company “${name}” added`, "success");
}

document.getElementById("s1-form").addEventListener("submit", (e) => {
  e.preventDefault();
  // validate requireds
  let ok = true;
  ["companyName","country","language","regulation"].forEach((id) => {
    const el = document.getElementById(id);
    el.classList.toggle("field-error", !el.value);
    if (!el.value) ok = false;
  });
  const pn = document.getElementById("productName");
  pn.classList.toggle("field-error", !pn.value.trim());
  if (!pn.value.trim()) ok = false;
  if (!document.querySelector(".choice-card.selected")) {
    toast("Please choose a Product Type (Hazardous or Non-Hazardous)", "warn");
    ok = false;
  }
  if (!ok) { toast("Please fill in the required fields", "warn"); return; }

  Object.assign(State.data.section1, {
    productName: pn.value.trim(),
    company: document.getElementById("companyName").value,
    formulation: document.getElementById("formulation").value,
    productCode: document.getElementById("productCode").value,
    versionNumber: document.getElementById("versionNumber").value,
    synonyms: document.getElementById("synonyms").value,
    country: document.getElementById("country").value,
    language: document.getElementById("language").value,
    regulation: document.getElementById("regulation").value,
    uses: document.getElementById("uses").value,
    emergency: document.getElementById("emergency").value,
    hazard: document.querySelector(".choice-card.selected").dataset.hazard,
  });
  markStepSaved("product");
  formDirty = false;
  State.save();

  const btn = document.getElementById("s1-save");
  btnBusy(btn, "Saving…");
  setTimeout(() => {
    btn.innerHTML = `${I.check} Saved`;
    toast("Section 1 saved — 1 SDS credit deducted", "success");
    setTimeout(() => (window.location.href = "section-3.html"), 650);
  }, 900);
});

// clear error state on interaction
document.querySelectorAll(".field").forEach((f) =>
  f.addEventListener("input", () => f.classList.remove("field-error"))
);

// ----- unsaved-changes guard -----
let formDirty = false;
const markDirty = () => { formDirty = true; };
document.querySelectorAll("#s1-form .field").forEach((f) => { f.addEventListener("input", markDirty); f.addEventListener("change", markDirty); });
document.querySelectorAll(".choice-card").forEach((c) => c.addEventListener("click", markDirty));
Nav.isDirty = () => formDirty;
</script>
</body>
</html>
