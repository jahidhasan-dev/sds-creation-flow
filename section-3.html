<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExactSDS — Section 3: Ingredient Details</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Figtree:wght@500;600&family=Plus+Jakarta+Sans:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="page-dots bg-white min-h-screen">

<header id="app-header"></header>

<div class="flex relative z-[1]">
  <aside id="app-rail" class="w-[76px] shrink-0 border-r border-[#e2e5e9] bg-white h-[calc(100vh-62px)] sticky top-0"></aside>

  <aside class="w-[222px] shrink-0 border-r border-[#e2e5e9] pt-8 pl-6 pr-4 hidden lg:block">
    <nav id="app-steps" class="anim-fade-up"></nav>
  </aside>

  <main class="flex-1 min-w-0 px-6 py-7">
    <div class="flex items-start justify-between anim-fade-up">
      <div>
        <h2 class="text-[20px] font-semibold text-[#0a0b19]">Section 3: <span class="text-[#5c67f9]">Ingredient Details</span></h2>
        <p class="text-[14px] text-[#45454d] mt-1">Enter the basic information about your product and SDS configuration</p>
      </div>
      <div class="flex items-center gap-3">
        <button id="btn-add-top" class="btn-primary !py-2.5 hidden" onclick="openAddChemical()"></button>
        <button class="btn-secondary !py-2.5" onclick="openPresetMenu(this)">
          <span class="text-[#727284]" id="preset-icon"></span> Select Preset
        </button>
      </div>
    </div>

    <!-- table card -->
    <section class="anim-fade-up delay-1 mt-5 border border-[#e2e5e9] rounded-2xl bg-white shadow-sm overflow-hidden flex flex-col" style="min-height: calc(100vh - 240px);">
      <div class="grid grid-cols-[1.4fr_1fr_.7fr_.7fr_1.5fr_1.1fr_84px] gap-2 items-center bg-[#f7f8fa] border-b border-[#e2e5e9] px-5 py-3 text-[14px] font-medium text-[#6a7282]">
        <span>Chemical Name</span><span>CAS ID</span><span>Actual %</span><span>PDF %</span><span>Hazard Code</span><span>Created</span><span></span>
      </div>

      <div id="chem-rows" class="flex-1"></div>

      <!-- empty state -->
      <div id="empty-state" class="flex-1 flex-col items-center justify-center py-16" style="display:none">
        <div class="anim-pop"></div>
        <h3 class="text-[24px] font-semibold text-[#1f1f26] mt-4 anim-fade-up delay-1">No Chemical yet</h3>
        <p class="text-[14px] text-[#45454d] mt-1 anim-fade-up delay-2">Please add you first chemical</p>
        <button class="btn-primary mt-5 anim-fade-up delay-3" onclick="openAddChemical()"><span id="plus-ic"></span> Add Camical</button>
      </div>

      <!-- footer -->
      <div id="table-footer" class="border-t border-[#e2e5e9] bg-white px-5 py-4 items-center justify-between" style="display:none">
        <p class="text-[15px]"><span class="font-semibold text-[#1f1f26]" id="chem-count">0 chemicals added</span> <span class="text-[#98989b]">· Ready to generate</span></p>
        <button class="btn-primary" onclick="openMixtureState()">Generate Final Hazard <span id="flask-ic"></span></button>
      </div>
    </section>
  </main>
</div>

<script src="assets/data.js"></script>
<script src="assets/common.js"></script>
<script>
renderShell({ step: 1, header: "breadcrumb", crumb: "Ingredient Details" });
document.getElementById("preset-icon").innerHTML = I.preset;
document.getElementById("plus-ic").innerHTML = I.plus;
document.getElementById("flask-ic").innerHTML = I.flask;
document.getElementById("btn-add-top").classList.remove("hidden");
document.getElementById("btn-add-top").innerHTML = `${I.plus} Add Camical`;
document.querySelector("#empty-state .anim-pop").innerHTML = I.emptyDoc;

/* ============ table rendering ============ */
function renderTable() {
  const rows = State.data.chemicals;
  const hasRows = rows.length > 0;
  document.getElementById("empty-state").style.display = hasRows ? "none" : "flex";
  document.getElementById("table-footer").style.display = hasRows ? "flex" : "none";
  document.getElementById("chem-rows").style.display = hasRows ? "block" : "none";
  document.getElementById("btn-add-top").style.display = hasRows ? "inline-flex" : "none";
  document.getElementById("chem-count").textContent = `${rows.length} chemical${rows.length === 1 ? "" : "s"} added`;
  document.getElementById("chem-rows").innerHTML = rows.map((c, idx) => {
    const created = fmtCreated(c.createdAt);
    return `
    <div class="tbl-row anim-row-in grid grid-cols-[1.4fr_1fr_.7fr_.7fr_1.5fr_1.1fr_84px] gap-2 items-center px-5 py-4 border-b border-[#eef0f3] text-[14px]" data-id="${c.id}">
      <span class="font-medium text-[#45454d]">${esc(c.name)}</span>
      <span class="font-semibold text-[#45454d]">${esc(c.cas)}</span>
      <span class="font-medium text-[#45454d]">${esc(c.actual)}</span>
      <span class="font-medium text-[#45454d]">${esc(c.pdf)}</span>
      <span class="flex flex-wrap gap-1.5">${c.hcodes.slice(0, 6).map((h) => hzBadge(h.code, h.tone)).join("")}</span>
      <span><span class="block text-[#45454d]">${created.date}</span><span class="block text-[12px] text-[#727284]">${created.time}</span></span>
      <span class="flex items-center justify-end gap-1">
        <button class="icon-btn" title="Edit" onclick="openDrawer('${c.id}')">${I.pencil}</button>
        <button class="icon-btn danger" title="Delete" onclick="removeChemical('${c.id}')">${I.trash}</button>
      </span>
    </div>`;
  }).join("");
}

function removeChemical(id) {
  const row = document.querySelector(`[data-id="${id}"]`);
  row.classList.add("anim-row-out");
  setTimeout(() => {
    State.data.chemicals = State.data.chemicals.filter((c) => c.id !== id);
    State.save();
    renderTable();
    toast("Chemical removed");
  }, 300);
}

/* ============ preset menu ============ */
function openPresetMenu(btn) {
  const ov = openOverlay(`
    <div class="modal bg-white rounded-2xl shadow-2xl w-[440px] p-6">
      <div class="flex items-center justify-between mb-1">
        <h3 class="text-[18px] font-medium text-[#1f1f26]">Select Preset</h3>
        <button class="icon-btn" onclick="closeOverlay(this.closest('.overlay'))">${I.x}</button>
      </div>
      <p class="text-[13px] text-[#727284] mb-4">Load a saved chemical composition into this SDS.</p>
      <div class="space-y-2.5">
        ${PRESETS.map((p, i) => `
          <button class="w-full text-left border border-[#e2e5e9] rounded-xl px-4 py-3.5 hover:border-[#5c67f9] hover:bg-[#fbfbff] transition-all group" onclick="applyPreset(${i}, this)">
            <span class="flex items-center justify-between">
              <span class="font-medium text-[#1f1f26] group-hover:text-[#3f43af]">${p.name}</span>
              <span class="text-[12px] text-[#727284]">${p.chemicals.length} chemicals</span>
            </span>
            <span class="block text-[12px] text-[#98989b] mt-1">${p.chemicals.map((c) => CAS_DB[c.cas].name).join(", ")}</span>
          </button>`).join("")}
      </div>
    </div>`);
}
function applyPreset(i, el) {
  const preset = PRESETS[i];
  closeOverlay(el.closest(".overlay"));
  let delay = 150;
  preset.chemicals.forEach((p, n) => {
    setTimeout(() => {
      const db = CAS_DB[p.cas];
      State.data.chemicals.push({
        id: uid(), name: db.name, cas: db.cas, actual: p.actual, pdf: p.pdf,
        hcodes: JSON.parse(JSON.stringify(db.hcodes)),
        exposure: JSON.parse(JSON.stringify(db.exposure)),
        tox: JSON.parse(JSON.stringify(db.tox)),
        eco: JSON.parse(JSON.stringify(db.eco)),
        createdAt: Date.now(),
      });
      State.save();
      renderTable();
      if (n === preset.chemicals.length - 1) toast(`Preset “${preset.name}” loaded`, "success");
    }, delay * n);
  });
}

/* ============ add chemical modal ============ */
let modalCtx = null; // { ov, foundChem }

function openAddChemical() {
  modalCtx = { found: null };
  const ov = openOverlay(`
    <div class="modal bg-white rounded-2xl shadow-2xl w-[768px] max-w-[94vw] p-7">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-[18px] font-medium text-[#1f1f26]">Add Chemical</h3>
        <button class="icon-btn" onclick="closeOverlay(this.closest('.overlay'))">${I.x}</button>
      </div>
      <div class="border border-[#e2e5e9] rounded-2xl bg-[#fcfcfd] p-6">
        <div class="flex items-center justify-between mb-4">
          <h4 class="text-[18px] font-semibold text-[#3f43af]">Chemical List</h4>
          <button class="btn-secondary !py-2 !text-[12px]">${I.preset} Select Preset</button>
        </div>
        <label class="lbl">CAS Number or Chemical Name</label>
        <input id="cas-input" class="field" placeholder="Search by CAS no or chemical name" autocomplete="off" />
        <div class="grid grid-cols-2 gap-5 mt-4">
          <div>
            <label class="lbl flex items-center gap-1.5">Actual Percentage
              <span class="tip text-[#98a2b3]">${I.help}<span class="tip-pop">The real concentration of this chemical in your mixture.</span></span>
            </label>
            <input id="actual-input" class="field" placeholder="e.g., 1.0" autocomplete="off" />
          </div>
          <div>
            <label class="lbl flex items-center gap-1.5">SDS Displayed Percentage
              <span class="tip text-[#98a2b3]">${I.help}<span class="tip-pop">The concentration range shown on the published SDS document.</span></span>
            </label>
            <input id="pdf-input" class="field" placeholder="e.g., 1.0" autocomplete="off" />
          </div>
        </div>
        <button id="search-btn" class="btn-soft w-full mt-5 !py-3" onclick="searchChemical()">${I.search} Search Chemical</button>
        <div id="found-panel"></div>
      </div>
    </div>`);
  modalCtx.ov = ov;
  setTimeout(() => ov.querySelector("#cas-input").focus(), 80);
  ov.querySelector("#cas-input").addEventListener("keydown", (e) => { if (e.key === "Enter") searchChemical(); });
}

function searchChemical() {
  const q = document.getElementById("cas-input").value.trim().toLowerCase();
  const input = document.getElementById("cas-input");
  if (!q) { input.classList.add("field-error"); input.focus(); return; }
  const btn = document.getElementById("search-btn");
  const panel = document.getElementById("found-panel");

  // searching state (gray button w/ loader — Figma 3541)
  btn.className = "w-full mt-5 py-3 rounded-[10px] bg-[#ececef] flex items-center justify-center gap-3 text-[#727284] cursor-wait";
  btn.innerHTML = `${Loader.diamond("sm")} <span class="text-[14px] font-medium">Searching PubChem…</span>`;
  panel.innerHTML = `
    <div class="mt-5 anim-fade-in">
      ${Loader.bar()}
      <div class="mt-4 space-y-3">
        <div class="skeleton h-[18px] w-[140px]"></div>
        <div class="grid grid-cols-2 gap-5"><div class="skeleton h-[44px]"></div><div class="skeleton h-[44px]"></div></div>
      </div>
    </div>`;

  setTimeout(() => {
    const hit = Object.values(CAS_DB).find((c) => c.cas === q || c.name.toLowerCase().includes(q));
    btn.className = "btn-soft w-full mt-5 !py-3";
    btn.innerHTML = `${I.search} Search Chemical`;
    if (!hit) {
      panel.innerHTML = `
        <div class="mt-5 border border-[#fecdca] bg-[#fef3f2] rounded-xl px-4 py-3.5 flex items-center gap-3 anim-scale-in">
          <span class="text-[#d92d20]">${I.warnCircle}</span>
          <div>
            <p class="text-[14px] font-medium text-[#912018]">No chemical found</p>
            <p class="text-[12px] text-[#b42318]">Try a CAS number like 7664-93-9, 7647-01-0, 1310-73-2 or 67-64-1.</p>
          </div>
        </div>`;
      return;
    }
    modalCtx.found = hit;
    panel.innerHTML = `
      <div class="mt-5 border border-[#d2d3fe] bg-[#f6f6ff] rounded-xl p-5 anim-scale-in">
        <p class="flex items-center gap-2 text-[16px] font-medium text-[#1f1f26]"><span class="text-[#5c67f9]">${I.checkbox}</span> Chemical Found</p>
        <div class="grid grid-cols-2 gap-5 mt-4">
          <div>
            <label class="lbl">Chemical Name</label>
            <div class="relative">
              <input id="found-name" class="field pr-9 bg-white" value="${esc(hit.name)}" />
              <span class="absolute right-3 top-1/2 -translate-y-1/2 text-[#98a2b3] pointer-events-none">${I.pencil}</span>
            </div>
          </div>
          <div>
            <label class="lbl">CAS Number</label>
            <input class="field field-locked" value="${esc(hit.cas)}" readonly />
          </div>
        </div>
        <button id="verify-btn" class="btn-primary btn-progress w-full mt-5 !py-3" onclick="verifyChemical()">
          <span class="fill"></span><span class="label">Verify</span>
        </button>
      </div>`;
  }, 1100);
}

function verifyChemical() {
  const btn = document.getElementById("verify-btn");
  if (btn.classList.contains("running")) return;
  btn.classList.add("running");
  btn.querySelector(".label").innerHTML = `<span class="inline-flex items-center gap-2.5">${Loader.dots()}<span>Verifying chemical data…</span></span>`;

  const name = document.getElementById("found-name").value.trim() || modalCtx.found.name;
  const actual = document.getElementById("actual-input").value.trim() || "1.0";
  const pdf = document.getElementById("pdf-input").value.trim() || "1.0";
  const db = modalCtx.found;

  setTimeout(() => {
    const chem = {
      id: uid(), name, cas: db.cas, actual, pdf,
      hcodes: JSON.parse(JSON.stringify(db.hcodes)),
      exposure: JSON.parse(JSON.stringify(db.exposure)),
      tox: JSON.parse(JSON.stringify(db.tox)),
      eco: JSON.parse(JSON.stringify(db.eco)),
      createdAt: Date.now(),
      draft: true,
    };
    closeOverlay(modalCtx.ov, () => openDrawer(null, chem));
  }, 1750);
}

/* ============ chemical drawer ============ */
let drawerCtx = null; // { chem, isNew, ov }

function openDrawer(existingId, draftChem) {
  const isNew = !existingId;
  const chem = isNew ? draftChem : State.data.chemicals.find((c) => c.id === existingId);
  drawerCtx = { chem, isNew };

  const ov = openOverlay(`
    <div class="drawer bg-white w-[860px] max-w-[95vw] h-full shadow-2xl flex flex-col">
      <div class="flex items-center justify-between px-6 py-4 border-b border-[#eef0f3]">
        <div class="flex items-center gap-4">
          <button class="icon-btn !p-2 border border-[#e2e5e9] rounded-full" onclick="closeOverlay(this.closest('.overlay'))">${I.x}</button>
          <div>
            <h3 class="text-[16px] font-semibold text-[#0a0b19]">${esc(chem.name)}</h3>
            <p class="text-[12px] text-[#727284]">CAS: ${esc(chem.cas)}</p>
          </div>
        </div>
        <button class="btn-primary !py-2.5" onclick="saveDrawer()">Save &amp; Close</button>
      </div>
      <div class="px-6 pt-4">
        <div class="tabbar" id="drawer-tabs">
          <div class="tab active" data-target="sec-hcode">H Code</div>
          <div class="tab" data-target="sec-exposure">Exposure</div>
          <div class="tab" data-target="sec-tox">Toxicology</div>
          <div class="tab" data-target="sec-eco">Ecotoxicity</div>
        </div>
      </div>
      <div id="drawer-body" class="nice-scroll flex-1 overflow-y-auto px-6 py-5 space-y-7"></div>
    </div>`, { drawer: true });
  drawerCtx.ov = ov;
  renderDrawerBody();

  // tab scrolling
  ov.querySelectorAll(".tab").forEach((t) =>
    t.addEventListener("click", () => {
      ov.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
      t.classList.add("active");
      document.getElementById(t.dataset.target).scrollIntoView({ behavior: "smooth", block: "start" });
    })
  );
}

const SECTION_HEAD = (icon, iconBg, title, sub) => `
  <div class="flex items-start gap-3 mb-3">
    <div class="w-9 h-9 rounded-lg ${iconBg} text-white flex items-center justify-center shrink-0 mt-0.5">${icon}</div>
    <div>
      <h4 class="text-[16px] font-semibold text-[#0a0b19]">${title}</h4>
      <p class="text-[12px] text-[#727284]">${sub}</p>
    </div>
  </div>`;

function renderDrawerBody() {
  const c = drawerCtx.chem;
  document.getElementById("drawer-body").innerHTML = `
    <!-- H CODE -->
    <section id="sec-hcode" class="anim-fade-up">
      ${SECTION_HEAD(I.shield, "bg-[#5c67f9]", `H Code for ${esc(c.name)}`, "Your selected “PubChem” data will be shown by default.")}
      <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-[#98a2b3]">${I.plus}</span>
        <input id="hcode-input" class="field pl-9" placeholder="Add code (e.g., H301, EUH070, AUH070)" autocomplete="off" />
      </div>
      <div class="border border-[#e2e5e9] rounded-xl p-3.5 mt-3 bg-[#fcfcfd]">
        <div id="hcode-grid" class="grid grid-cols-2 gap-3"></div>
      </div>
    </section>

    <!-- EXPOSURE -->
    <section id="sec-exposure" class="anim-fade-up delay-1">
      ${SECTION_HEAD(I.warn, "bg-[#f79009]", "Exposure Parameters", "Edit inline; click outside to save locally.")}
      <div class="border border-[#e2e5e9] rounded-xl overflow-hidden bg-white">
        <div class="grid grid-cols-[1fr_1fr_1fr_72px] bg-[#f7f8fa] border-b border-[#e2e5e9] px-4 py-2.5 text-[14px] font-medium text-[#6a7282]">
          <span>Method</span><span>Regulation</span><span>Limit Value</span><span></span>
        </div>
        <div id="exposure-rows"></div>
        <button class="w-full py-3 text-[#667085] font-medium text-[15px] hover:bg-[#fafbfe] hover:text-[#5c67f9] transition-colors flex items-center justify-center gap-2" onclick="addRow('exposure')">${I.plus} Add New</button>
      </div>
    </section>

    <!-- TOXICOLOGY -->
    <section id="sec-tox" class="anim-fade-up delay-2">
      ${SECTION_HEAD(I.flask, "bg-[#f63d68]", "Toxicological", "Edit inline; click outside to save locally.")}
      <div class="border border-[#e2e5e9] rounded-xl overflow-hidden bg-white">
        <div class="grid grid-cols-[1fr_1fr_1fr_1fr_72px] bg-[#f7f8fa] border-b border-[#e2e5e9] px-4 py-2.5 text-[14px] font-medium text-[#6a7282]">
          <span>Result</span><span>Dose</span><span>Species</span><span>Exposure</span><span></span>
        </div>
        <div id="tox-rows"></div>
        <button class="w-full py-3 text-[#667085] font-medium text-[15px] hover:bg-[#fafbfe] hover:text-[#5c67f9] transition-colors flex items-center justify-center gap-2" onclick="addRow('tox')">${I.plus} Add New</button>
      </div>
    </section>

    <!-- ECOTOXICITY -->
    <section id="sec-eco" class="anim-fade-up delay-3 pb-8">
      ${SECTION_HEAD(I.shieldCheck, "bg-[#12b76a]", "Ecotoxicity", "Edit inline; click outside to save locally.")}
      <div class="border border-[#e2e5e9] rounded-xl overflow-hidden bg-white">
        <div class="grid grid-cols-[1.4fr_.8fr_1fr_.8fr_72px] bg-[#f7f8fa] border-b border-[#e2e5e9] px-4 py-2.5 text-[14px] font-medium text-[#6a7282]">
          <span>Species</span><span>Result</span><span>Value</span><span>Duration</span><span></span>
        </div>
        <div id="eco-rows"></div>
        <button class="w-full py-3 text-[#667085] font-medium text-[15px] hover:bg-[#fafbfe] hover:text-[#5c67f9] transition-colors flex items-center justify-center gap-2" onclick="addRow('eco')">${I.plus} Add New</button>
      </div>
    </section>`;

  renderHCodes();
  renderDataRows("exposure", ["method", "regulation", "limit"]);
  renderDataRows("tox", ["result", "dose", "species", "exposure"]);
  renderDataRows("eco", ["species", "result", "value", "duration"]);

  attachCodeSuggest(document.getElementById("hcode-input"), (code, entry) => {
    drawerCtx.chem.hcodes.push({ code, text: entry.text, tone: entry.tone });
    renderHCodes(true);
    toast(`Code ${code} added`, "success");
  });
}

function renderHCodes(animateLast) {
  const grid = document.getElementById("hcode-grid");
  const list = drawerCtx.chem.hcodes;
  grid.innerHTML = list.map((h, i) => `
    <div class="code-card ${i === 0 || (animateLast && i === list.length - 1) ? "anim-scale-in" : ""} ${i === 0 || i === 3 ? "selected" : ""}">
      ${hzBadge(h.code, h.tone)}
      <span class="text-[12px] font-medium text-[#727284] leading-4 line-clamp-2">${esc(h.text)}</span>
      <span class="x" onclick="removeHCode(this, ${i})">${I.x}</span>
    </div>`).join("");
}
function removeHCode(el, i) {
  const card = el.closest(".code-card");
  card.classList.add("removing");
  setTimeout(() => { drawerCtx.chem.hcodes.splice(i, 1); renderHCodes(); }, 220);
}

const ROW_GRID = { exposure: "grid-cols-[1fr_1fr_1fr_72px]", tox: "grid-cols-[1fr_1fr_1fr_1fr_72px]", eco: "grid-cols-[1.4fr_.8fr_1fr_.8fr_72px]" };

function renderDataRows(kind, fields) {
  const host = document.getElementById(`${kind}-rows`);
  const rows = drawerCtx.chem[kind];
  const PLACEHOLDERS = {
    method: "e.g., TWA", regulation: "e.g., OSHA PEL", limit: "e.g., 750 ppm",
    result: "e.g., LD50", dose: "e.g., 5800mg/kg", species: "e.g., Rat", exposure: "e.g., Oral",
    value: "e.g., 5540 mg/L", duration: "e.g., 96 hours",
  };
  host.innerHTML = rows.map((r, i) => `
    <div class="grid ${ROW_GRID[kind]} items-center gap-2 px-4 py-2.5 border-b border-[#eef0f3] text-[14px] anim-row-in">
      ${fields.map((f) => `<input class="cell-input" value="${esc(r[f] || "")}" placeholder="${PLACEHOLDERS[f] || "—"}" onblur="drawerCtx.chem['${kind}'][${i}]['${f}']=this.value" />`).join("")}
      <span class="flex justify-end gap-1">
        <button class="icon-btn" title="Edit">${I.pencil}</button>
        <button class="icon-btn danger" title="Delete" onclick="deleteRow('${kind}', ${i}, '${fields.join(",")}')">${I.trash}</button>
      </span>
    </div>`).join("");
}
function addRow(kind) {
  const fields = { exposure: ["method", "regulation", "limit"], tox: ["result", "dose", "species", "exposure"], eco: ["species", "result", "value", "duration"] }[kind];
  drawerCtx.chem[kind].push(Object.fromEntries(fields.map((f) => [f, ""])));
  renderDataRows(kind, fields);
  const host = document.getElementById(`${kind}-rows`);
  const inputs = host.lastElementChild.querySelectorAll("input");
  inputs[0] && inputs[0].focus();
}
function deleteRow(kind, i, fieldsCsv) {
  drawerCtx.chem[kind].splice(i, 1);
  renderDataRows(kind, fieldsCsv.split(","));
}

/* ============ missing-data check + save ============ */
function missingDataReport(chem) {
  const items = [];
  const incomplete = (rows, fields) => rows.filter((r) => fields.some((f) => !String(r[f] || "").trim())).length;
  const toxBad = incomplete(chem.tox, ["result", "dose", "species", "exposure"]);
  if (chem.tox.length === 0) items.push("Toxicological table: No data entered");
  else if (toxBad) items.push(`Toxicological table: ${toxBad} row(s) with incomplete data`);
  const expBad = incomplete(chem.exposure, ["method", "regulation", "limit"]);
  if (chem.exposure.length === 0) items.push("Exposure table: No data entered");
  else if (expBad) items.push(`Exposure table: ${expBad} row(s) with incomplete data`);
  const ecoBad = incomplete(chem.eco, ["species", "result", "value", "duration"]);
  if (chem.eco.length === 0) items.push("Ecotoxicity table: No data entered");
  else if (ecoBad) items.push(`Ecotoxicity table: ${ecoBad} row(s) with incomplete data`);
  return items;
}

function saveDrawer() {
  const missing = missingDataReport(drawerCtx.chem);
  if (missing.length) { openMissingDataModal(missing); return; }
  commitDrawer();
}

function openMissingDataModal(items) {
  openOverlay(`
    <div class="modal bg-white rounded-2xl shadow-2xl w-[500px] max-w-[92vw] p-7 text-center relative">
      <button class="icon-btn absolute top-4 right-4" onclick="closeOverlay(this.closest('.overlay'))">${I.x}</button>
      <div class="w-[62px] h-[62px] rounded-full bg-[#fdf2dc] text-[#f79009] flex items-center justify-center mx-auto anim-pop">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5 2.8 19.5a1 1 0 0 0 .9 1.5h16.6a1 1 0 0 0 .9-1.5L12 3.5Z"/><path d="M12 10v4"/><path d="M12 17.3v.05"/></svg>
      </div>
      <h3 class="text-[22px] font-semibold text-[#1f1f26] mt-4">Missing Data Warning</h3>
      <p class="text-[14px] text-[#45454d] mt-2 leading-5">Some data is missing in your tables. This data will not be visible in the generated PDF. Do you want to proceed with saving?</p>
      <div class="text-left border border-[#e2e5e9] bg-[#fcfcfd] rounded-xl p-4 mt-5">
        <p class="flex items-center gap-2 text-[15px] font-semibold text-[#1f1f26] mb-2">
          <span class="w-[15px] h-[15px] rounded-full border-2 border-[#f79009] flex items-center justify-center shrink-0"><span class="w-[6px] h-[6px] rounded-full bg-[#f79009]"></span></span>
          Missing Data Items
        </p>
        ${items.map((t) => `<p class="text-[13px] text-[#45454d] leading-6 pl-6">${t}</p>`).join("")}
      </div>
      <p class="text-[13px] text-[#b42318] text-left mt-4 leading-5 flex gap-1.5">
        <span class="mt-0.5 shrink-0">${I.warnCircle}</span>
        <span><span class="font-semibold">Note:</span> Once you finalize this chemical name, it cannot be edited later. Please review it carefully before proceeding.</span>
      </p>
      <div class="grid grid-cols-2 gap-3 mt-6">
        <button class="btn-secondary !py-3" onclick="closeOverlay(this.closest('.overlay'))">${I.x} Cancel</button>
        <button class="btn-primary !py-3" onclick="closeOverlay(this.closest('.overlay'), commitDrawer)">Yes, Save Anyway ${I.check}</button>
      </div>
    </div>`);
}

function commitDrawer() {
  const c = drawerCtx.chem;
  if (drawerCtx.isNew) {
    delete c.draft;
    State.data.chemicals.push(c);
  }
  State.save();
  closeOverlay(drawerCtx.ov, () => {
    renderTable();
    toast(`${c.name} ${drawerCtx.isNew ? "added to ingredient list" : "updated"}`, "success");
  });
}

/* ============ mixture state + generate ============ */
function openMixtureState() {
  openOverlay(`
    <div class="modal bg-white rounded-2xl shadow-2xl w-[490px] max-w-[92vw] p-7 text-center relative">
      <button class="icon-btn absolute top-4 right-4" onclick="closeOverlay(this.closest('.overlay'))">${I.x}</button>
      <div class="w-[62px] h-[62px] rounded-full bg-[#eef0fe] text-[#5c67f9] flex items-center justify-center mx-auto anim-pop">${I.flask}</div>
      <h3 class="text-[22px] font-semibold text-[#1f1f26] mt-4">Select Mixture State</h3>
      <p class="text-[14px] text-[#45454d] mt-2 leading-5">Please select the physical state of your mixture to<br/>generate the final hazard code.</p>
      <div class="text-left mt-6">
        <label class="lbl">Mixture State:</label>
        <select id="mix-state" class="field placeholder">
          <option value="" disabled selected hidden>Select estate...</option>
          ${MIXTURE_STATES.map((s) => `<option>${s}</option>`).join("")}
        </select>
      </div>
      <div class="grid grid-cols-2 gap-3 mt-7">
        <button class="btn-secondary !py-3" onclick="closeOverlay(this.closest('.overlay'))">${I.arrowLeft} Back to Form</button>
        <button class="btn-primary !py-3" onclick="confirmGenerate(this)">Confirm &amp; Generate ${I.flask}</button>
      </div>
    </div>`);
  const sel = document.getElementById("mix-state");
  sel.addEventListener("change", () => sel.classList.remove("placeholder"));
}

function confirmGenerate(btn) {
  const sel = document.getElementById("mix-state");
  if (!sel.value) { sel.classList.add("field-error"); toast("Please select a mixture state", "warn"); return; }
  State.data.mixtureState = sel.value;
  State.save();
  btnBusy(btn, "Generating…");
  const modal = btn.closest(".modal");
  setTimeout(() => {
    const names = State.data.chemicals.map((c) => c.name);
    modal.innerHTML = `
      <div class="py-8 anim-fade-in text-center">
        <div class="flex justify-center">${Loader.diamond("lg")}</div>
        <h3 class="text-[20px] font-semibold text-[#1f1f26] mt-6">Analyzing ${names.length} chemicals…</h3>
        <p class="text-[14px] text-[#727284] mt-1.5">Combining hazard codes for a <b>${esc(sel.value)}</b> mixture</p>
        <p class="text-[13px] text-[#98a2b3] mt-4 h-5" id="mix-ticker"></p>
        <div class="max-w-[280px] mx-auto mt-3">${Loader.bar()}</div>
      </div>`;
    // cycle chemical names under the loader
    let n = 0;
    const ticker = setInterval(() => {
      const el = document.getElementById("mix-ticker");
      if (!el) { clearInterval(ticker); return; }
      el.textContent = names.length ? `Evaluating ${names[n % names.length]} (${(n % names.length) + 1}/${names.length})` : "Evaluating composition…";
      n++;
    }, 420);
    setTimeout(() => { clearInterval(ticker); window.location.href = "final-hazard.html"; }, 2000);
  }, 600);
}

/* boot */
renderTable();
</script>
</body>
</html>
